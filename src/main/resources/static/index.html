<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Task Scheduler</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; }
        header { background: #1a73e8; color: white; padding: 20px 40px; }
        header h1 { font-size: 24px; }
        header p { font-size: 14px; opacity: 0.85; margin-top: 4px; }
        .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }
        .card { background: white; border-radius: 12px; padding: 24px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .card h2 { margin-bottom: 16px; font-size: 18px; color: #1a73e8; }
        input, textarea { width: 100%; padding: 10px 14px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        textarea { height: 80px; resize: none; }
        button { background: #1a73e8; color: white; border: none; padding: 10px 24px; border-radius: 8px; cursor: pointer; font-size: 14px; }
        button:hover { background: #1558b0; }
        .task-list { display: flex; flex-direction: column; gap: 12px; }
        .task-card { background: white; border-radius: 10px; padding: 16px 20px; box-shadow: 0 2px 6px rgba(0,0,0,0.07); display: flex; justify-content: space-between; align-items: center; }
        .task-info h3 { font-size: 16px; margin-bottom: 4px; }
        .task-info p { font-size: 13px; color: #666; }
        .task-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
        .badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .HIGH { background: #fde8e8; color: #c0392b; }
        .MEDIUM { background: #fef3cd; color: #d68910; }
        .LOW { background: #e8f8e8; color: #27ae60; }
        .status { font-size: 12px; color: #888; }
        .actions { display: flex; gap: 8px; }
        .btn-complete { background: #27ae60; font-size: 12px; padding: 6px 12px; }
        .btn-complete:hover { background: #1e8449; }
        .btn-delete { background: #e74c3c; font-size: 12px; padding: 6px 12px; }
        .btn-delete:hover { background: #c0392b; }
        .loading { text-align: center; color: #888; padding: 20px; }
    </style>
</head>
<body>
    <header>
        <h1>🧠 Smart Task Scheduler</h1>
        <p>AI-powered task priority prediction using Groq</p>
    </header>

    <div class="container">
        <div class="card">
            <h2>➕ Add New Task</h2>
            <input type="text" id="title" placeholder="Task title..." />
            <textarea id="description" placeholder="Describe your task... (AI will predict priority)"></textarea>
            <select id="priorityOverride">
            <option value="">🤖 Let AI decide priority</option>
            <option value="HIGH">🔴 HIGH</option>
            <option value="MEDIUM">🟡 MEDIUM</option>
            <option value="LOW">🟢 LOW</option>
</select>
<button onclick="addTask()">Add Task</button>
        </div>

        <div class="card">
            <h2>📋 All Tasks</h2>
            <div class="task-list" id="taskList">
                <div class="loading">Loading tasks...</div>
            </div>
        </div>
    </div>

    <script>
        const API = "http://localhost:8080/api/tasks";

        async function loadTasks() {
            const res = await fetch(API);
            const tasks = await res.json();
            const list = document.getElementById("taskList");
            if (tasks.length === 0) {
                list.innerHTML = "<div class='loading'>No tasks yet. Add one above!</div>";
                return;
            }
            list.innerHTML = tasks.map(task => `
                <div class="task-card">
                    <div class="task-info">
                        <h3>${task.title}</h3>
                        <p>${task.description}</p>
                    </div>
                    <div class="task-meta">
                        <span class="badge ${task.priority}">${task.priority}</span>
                        <span class="status">${task.status}</span>
                        <div class="actions">
                            ${task.status !== 'COMPLETED' ? `<button class="btn-complete" onclick="completeTask(${task.id})">✅ Done</button>` : ''}
                            <button class="btn-delete" onclick="deleteTask(${task.id})">🗑️ Delete</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function addTask() {
    const title = document.getElementById("title").value.trim();
    const description = document.getElementById("description").value.trim();
    const priorityOverride = document.getElementById("priorityOverride").value;
    if (!title || !description) {
        alert("Please fill in both title and description!");
        return;
    }
    document.querySelector("button").innerText = priorityOverride ? "Adding task..." : "⏳ AI is predicting priority...";
    
    const taskData = { title, description, status: "PENDING" };
    if (priorityOverride) {
        taskData.priority = priorityOverride;
    }

    await fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(taskData)
    });
    document.getElementById("title").value = "";
    document.getElementById("description").value = "";
    document.getElementById("priorityOverride").value = "";
    document.querySelector("button").innerText = "Add Task";
    loadTasks();
}

        async function completeTask(id) {
            await fetch(`${API}/${id}/status?status=COMPLETED`, { method: "PUT" });
            loadTasks();
        }

        async function deleteTask(id) {
            await fetch(`${API}/${id}`, { method: "DELETE" });
            loadTasks();
        }

        loadTasks();
    </script>
</body>
</html>
